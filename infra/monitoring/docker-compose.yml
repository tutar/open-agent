name: open-agent-monitoring

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    user: "0:0"
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --enable-feature=otlp-write-receiver
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - ./data/prometheus:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring

  loki:
    image: grafana/loki:3.1.1
    user: "0:0"
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/config.yml:ro
      - ./data/loki:/loki
    networks:
      - monitoring

  tempo:
    image: grafana/tempo:2.6.1
    user: "0:0"
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo/config.yml
    ports:
      - "3200:3200"
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/config.yml:ro
      - ./data/tempo:/var/tempo
    networks:
      - monitoring

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.107.0
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ./otel/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:3.1.1
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./data/promtail:/tmp/promtail
      - ./data/host-logs:/var/log/open-agent:ro
    depends_on:
      - loki
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.1.4
    user: "0:0"
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
