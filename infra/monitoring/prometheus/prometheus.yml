global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    stack: open-agent-monitoring

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888

  - job_name: otel-collector-otlp-metrics
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100

  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets:
          - tempo:3200

  - job_name: promtail
    metrics_path: /metrics
    static_configs:
      - targets:
          - promtail:9080
