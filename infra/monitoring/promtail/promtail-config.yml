server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: openagent-local
    static_configs:
      - targets:
          - localhost
        labels:
          job: openagent-local
          service: openagent
          log_type: file
          __path__: /var/log/open-agent/*.log
